services:
  - type: web
    name: code-sensei-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Ensure modern Python
      - key: OPENROUTER_API_KEY
        sync: false # User must provide this in the Render dashboard manually
      - key: ALLOWED_ORIGINS
        value: https://code-sensei-xai.vercel.app
